<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>오프라인 안내 | 더이로운기업</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#0f62fe" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="더이로운기업" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: #161616;
      background: #f4f4f4;
      font-family: "IBM Plex Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    main {
      width: min(100%, 560px);
    }

    img {
      width: 172px;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }

    h1 {
      font-size: clamp(34px, 8vw, 58px);
      font-weight: 300;
      line-height: 1.12;
      letter-spacing: 0;
      margin-bottom: 18px;
    }

    p {
      color: #525252;
      font-size: 17px;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a,
    button {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: #0f62fe;
      color: #fff;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      background: #161616;
    }

    @media (max-width: 520px) {
      body {
        place-items: start;
        padding: 42px 22px;
      }

      img {
        width: 148px;
      }

      a,
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="./assets/the-eroun-logo.png" alt="더이로운기업 Road Map & Free Funds Consulting" />
    <h1>인터넷 연결이 필요합니다.</h1>
    <p>이미 열어본 주요 페이지는 다시 볼 수 있지만, 로드맵 문의 접수와 첨부파일 업로드는 온라인 상태에서 진행됩니다.</p>
    <div class="actions">
      <a href="./funding-strategy-lab.html">메인으로 이동</a>
      <button type="button" onclick="window.location.reload()">다시 시도</button>
    </div>
  </main>
  <script src="./assets/pwa-register.js?v=7"></script>
  <script src="./assets/disable-mobile-zoom.js"></script>
</body>
</html>
