<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>모바일 미리보기 | 더이로운기업</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <meta property="og:image" content="https://baeyzun-create.github.io/funding-strategy-lab-site/assets/social-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://baeyzun-create.github.io/funding-strategy-lab-site/assets/social-preview.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f5f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans KR", sans-serif;
      color: #1d1d1f;
      letter-spacing: 0;
      overflow-wrap: break-word;
    }

    .preview-shell {
      width: min(100vw, 430px);
      padding: 18px 12px;
    }

    .preview-label {
      margin: 0 0 10px;
      text-align: center;
      font-size: 12px;
      line-height: 1.3;
      color: #7a7a7a;
      letter-spacing: 0;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 56px));
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid #d2d2d7;
      border-radius: 34px;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <main class="preview-shell">
    <p class="preview-label">390px 모바일 화면 미리보기</p>
    <div class="phone-frame">
      <iframe src="./funding-strategy-lab.html" title="더이로운기업 모바일 미리보기"></iframe>
    </div>
  </main>
  <script src="./assets/disable-mobile-zoom.js"></script>
</body>
</html>
